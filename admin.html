<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1d2b64 0%, #f8cdda 100%);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .panel {
      background: rgba(255,255,255,0.95);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      width: 360px;
      text-align: center;
    }
    h1 {
      margin-top: 0;
      color: #223a5e;
    }
    p {
      color: #4a4a4a;
      margin: 14px 0 24px;
    }
    .button-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .button-row a,
    .button-row button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      text-decoration: none;
      color: white;
      background: #4a79ff;
    }
    .button-row button {
      background: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Admin Panel</h1>
    <p>Welcome! You have entered the correct password. From here you can access the Flappy Bird game.</p>
    <div class="button-row">
      <a href="flappy.html">Open Flappy Bird</a>
      <button onclick="goBack()">Back to Login</button>
    </div>
  </div>

  <script>
    function goBack() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
